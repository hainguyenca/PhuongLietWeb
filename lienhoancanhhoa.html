<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Công An Phường Phương Liệt</title>
<style type="text/css">
    /* ========================================================
       1. CSS VARIABLES (BIẾN TOÀN CỤC) - DỄ DÀNG QUẢN LÝ MÀU SẮC
       ======================================================== */
    :root {
        --bg-color-center: #cc0000;
        --bg-color-mid: #4d0000;
        --bg-color-edge: #1a0000;
        --text-gold-main: #ffcc00;
        --text-gold-sub: #ffeb99;
        --gradient-gold-main: linear-gradient(to bottom, #ffe89e 0%, #ffcc00 40%, #b38600 75%, #ffea9f 100%);
        --gradient-gold-sub: linear-gradient(to bottom, #ffffff 0%, #ffdd6b 50%, #cc9900 100%);
    }

    /* ========================================================
       2. THIẾT LẬP HỆ THỐNG GIAO DIỆN MÀN HÌNH CHUNG
       ======================================================== */
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden; 
        background: radial-gradient(circle at center, var(--bg-color-center) 0%, var(--bg-color-mid) 70%, var(--bg-color-edge) 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Times New Roman', Times, serif;
        color: #ffffff;
        user-select: none;
    }

    /* Khung LED tỷ lệ chuẩn 16:9 áp dụng công nghệ CSS hiện đại */
    .container {
        position: relative;
        width: 100vw;
        height: 100vh;
        max-width: 177.78vh; 
        max-height: 56.25vw; 
        aspect-ratio: 16 / 9;
        box-sizing: border-box;
        overflow: hidden;
    }

    /* ========================================================
       3. LỚP NỀN VÀ TRANG TRÍ (Z-INDEX: 1 & 2)
       ======================================================== */
    .drum-rotating {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 85vmax; 
        height: 85vmax;
        background-image: url('trong_dong.png'); 
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        opacity: 0.5; /* Chinh do mo cua trong dong */
        z-index: 1;
        will-change: transform; 
        animation: spin 90s linear infinite; 
    }

    @keyframes spin {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .decor-layer {
        position: absolute;
        inset: 0; 
        z-index: 2;
        pointer-events: none;
    }
    .decor-layer img {
        position: absolute;
        bottom: 2%;
        width: 30%; /* Chinh kich thuoc hoa sen*/
        height: auto;
    }
    .lotus-left { left: 1%; }
    .lotus-right { right: 1%; }

    /* ========================================================
       4. LỚP NỘI DUNG VĂN BẢN (Z-INDEX: 3 - CHỮ ĐÈ TRÊN HOA)
       ======================================================== */
    .content-layer {
        position: absolute;
        inset: 0;
        z-index: 3; /* Đặt z-index lớn hơn container hoa để hiển thị đè lên trên */
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1.5% 6% 4% 6%; 
        box-sizing: border-box;
    }

    /* --- PHẦN HEADER: LOGO & TÊN CƠ QUAN --- */
    header {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        margin-top: 0; 
    }

    .police-badge {
        width: 12vw; 
        height: auto;
        margin-right: 2vw; 
        filter: drop-shadow(0 0 20px rgba(255, 255, 0, 0.7)); 
    }

    .unit-header {
        text-align: center; 
    }
    .unit-header h2, .unit-header h3 {
        margin: 0;
        text-transform: uppercase;
        font-weight: bold;
        letter-spacing: 1px;
        text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    }
    .unit-header h2 { font-size: 2.5vw; }
    .unit-header h3 { font-size: 2.2vw; margin-top: 0.5vw; } 

    /* --- PHẦN MAIN: NỘI DUNG CHÍNH SỰ KIỆN --- */
    main {
        text-align: center;
        margin: 8% 0 auto 0; 
    }
    main h1 {
        margin: 0;
        font-size: 6.8vw;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--text-gold-main); 
        background: var(--gradient-gold-main);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 3px 2px rgba(0, 0, 0, 0.9)) 
                drop-shadow(0 0 10px rgba(255, 215, 0, 0.6)) 
                drop-shadow(0 0 25px rgba(255, 128, 0, 0.4));
    }
    main p {
        margin: 2.5% 0 0 0;
        font-size: 3.5vw;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-gold-sub);
        background: var(--gradient-gold-sub);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.9)) 
                drop-shadow(0 0 12px rgba(255, 218, 102, 0.5));
    }

    /* --- PHẦN FOOTER: THỜI GIAN ĐỊA ĐIỂM --- */
    footer {
        text-align: center;
        width: 100%;
        margin-bottom: 1.5%;
    }
    footer p {
        margin: 0;
        font-size: 2.5vw;
        font-family: 'Times New Roman', Times, serif;
        font-style: italic;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
    }

    /* ========================================================
       5. HIỆU ỨNG CÁNH HOA HỒNG RƠI CHÉO TOÀN CẠNH TRÊN (Z-INDEX: 2)
       ======================================================== */
    #rose-container {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 2; /* Nằm dưới lớp chữ (z-index: 3) */
    }

    .petal {
        position: absolute;
        user-select: none;
        pointer-events: none;
        animation: fallDiagonal linear infinite;
        filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.15));

        /* --------------------------------------------------------
           CHỖ ĐỊNH HÌNH CÁNH HOA VÀ MÀU SẮC CSS:
           - border-radius: tạo góc nhọn và góc bo tròn tạo hình cánh hoa.
           - background: Đổ màu Gradient từ hồng phấn sang đỏ hồng đô.
           -------------------------------------------------------- */
        border-radius: 50% 0 50% 50%;
        background: radial-gradient(circle at 30% 30%, #ff758f 0%, #ff4d6d 60%, #c9184a 100%);
    }

    @keyframes fallDiagonal {
        0% {
            transform: translate(0, -10vh) rotate(0deg) rotateY(0deg);
            opacity: 0;
        }
        10% {
            opacity: 0.85;
        }
        90% {
            opacity: 0.85;
        }
        100% {
            transform: translate(35vw, 105vh) rotate(450deg) rotateY(180deg);
            opacity: 0;
        }
    }
</style>
</head>
<body>

    <div class="container">
        
        <!-- Khung chứa hiệu ứng cánh hoa hồng rơi (Nằm sau lớp văn bản) -->
        <div id="rose-container"></div>
        
        <div class="drum-rotating"></div>

        <div class="decor-layer">
            <img class="lotus-left" src="hoa_sen_trai.png" alt="Hoa sen góc trái">
            <img class="lotus-right" src="hoa_sen_phai.png" alt="Hoa sen góc phải">
        </div>

        <div class="content-layer">
            
            <header>
                <img class="police-badge" src="cong_an_hieu.png" alt="Công an hiệu">
                <div class="unit-header">
                    <h3>Công an Thành phố Hà Nội</h3>
                    <h3>Công an phường Phương Liệt</h3>
                </div>
            </header>

            <main>
                <h1><a href="index.html" style="text-decoration: none;">HỘI NGHỊ</a></h1>
                <p>SƠ KẾT CÔNG TÁC CÔNG AN 6 THÁNG ĐẦU NĂM VÀ TRIỂN KHAI NHIỆM VỤ TRỌNG TÂM 6 THÁNG CUỐI NĂM 2026</p>
            </main>

            <footer>
                <p>Phương Liệt, ngày 05 tháng 06 năm 2026</p>
            </footer>

        </div>
    </div>

    <!-- Script điều khiển tự động tạo cánh hoa hồng rơi -->
    <script type="text/javascript">
        function createPetal() {
            const container = document.getElementById('rose-container');
            if (!container) return;

            const petal = document.createElement('div');
            petal.classList.add('petal');

            // Xuất hiện ngẫu nhiên rải đều từ lề trái sang lề phải của cạnh trên màn hình
            petal.style.top = '-5vh';
            petal.style.left = Math.random() * 100 + 'vw'; 

            // Kích thước cánh hoa tỉ lệ theo độ phân giải màn hình LED (vw)
            const size = Math.random() * 0.8 + 1.0; 
            petal.style.width = size + 'vw';
            petal.style.height = size + 'vw';

            // Tốc độ rơi từ 7 đến 12 giây tạo sự tự nhiên sinh động
            const duration = Math.random() * 5 + 7;
            petal.style.animationDuration = duration + 's';

            container.appendChild(petal);

            // Tự động xóa phần tử khỏi bộ nhớ sau khi hoàn thành chu kỳ rơi
            setTimeout(() => {
                petal.remove();
            }, duration * 1000);
        }

        // TẦN SUẤT XUẤT HIỆN DÀY: Cứ mỗi 300ms (0.3 giây) lại có 1 cánh hoa rơi xuống
        setInterval(createPetal, 600);
    </script>
</body>
</html>
